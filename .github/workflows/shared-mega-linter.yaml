name: Shared / MegaLinter

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_COLOR: 1

jobs:
  mega-linter:
    name: MegaLinter
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    environment:
      name: mega-linter
      deployment: false
    outputs:
      pull-request-url: ${{ steps.pr.outputs.pull-request-url }}
    steps:
      - id: auth
        name: Auth
        uses: liblaf/actions/auth@d510a5eaa5206b30ed1009660d04ef8082daf2d9 # v2
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: lint
        name: MegaLinter
        uses: liblaf/megalinter-custom-flavor-all@e4ff3731165d0b37dcf66ef40ddcd9e6c1825adf # main
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          MEGALINTER_CONFIG: https://raw.githubusercontent.com/liblaf/megalinter-custom-flavor-all/refs/heads/main/.mega-linter.yml
      - if: success() || failure()
        name: Upload reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mega-linter-reports
          path: |-
            mega-linter.log
            megalinter-reports
          include-hidden-files: true
      - if: success() || failure()
        name: Remove MegaLinter reports
        run: |-
          cp --target-directory='${{ runner.temp }}' --verbose 'megalinter-reports/megalinter-report.md'
          sudo rm --force --recursive 'mega-linter.log' 'megalinter-reports'
      - id: pr
        if: >-
          steps.lint.outputs.has-updated-sources == 1 && (github.event_name ==
          'push' || github.event.pull_request.head.repo.full_name ==
          github.repository)
        name: Create PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.auth.outputs.token }}
          commit-message: "chore(mega-linter): apply linters automatic fixes"
          branch: mega-linter/${{ github.head_ref || github.ref_name }}
          delete-branch: true
          sign-commits: true
          title: "chore(mega-linter): apply linters automatic fixes"
          body-path: ${{ runner.temp }}/megalinter-report.md
          labels: |-
            automerge
            mega-linter
          assignees: ${{ github.repository_owner }}

  approve:
    name: Approve
    permissions:
      pull-requests: write
    needs:
      - mega-linter
    if: needs.mega-linter.outputs.pull-request-url
    runs-on: ubuntu-latest
