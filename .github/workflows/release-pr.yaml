concurrency:
  group: ${{ github.workflow }} @ ${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Version
    if: >-
      ${{ !startsWith(github.event.head_commit.message, 'chore(release): ') }}
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.version.outputs.bumped }}
      release-as: ${{ steps.version.outputs.release-as }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: git-cliff
      - id: version
        name: Next version
        uses: liblaf/actions/next-version@30c85b7c83d5db558c3113c5a7297837f6fe4904 # v1
        env:
          GIT_CLIFF_CONFIG_URL: ${{ env.GIT_CLIFF_CONFIG_URL }}
          GITHUB_TOKEN: ${{ github.token }}

  release-pr:
    name: Create PR
    permissions:
      contents: write
      issues: write
      pull-requests: write
    needs:
      - version
    if: needs.version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    environment:
      name: release-please
      deployment: false
    steps:
      - id: auth
        name: Auth
        uses: liblaf/actions/auth@d510a5eaa5206b30ed1009660d04ef8082daf2d9 # v2
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: git-cliff
      - name: Generate changelog
        run: |-
          git-cliff
          npx prettier --write --no-config "$GIT_CLIFF_OUTPUT"
        env:
          GIT_CLIFF_CONFIG_URL: ${{ env.GIT_CLIFF_CONFIG_URL }}
          GIT_CLIFF_OUTPUT: CHANGELOG.md
          GIT_CLIFF_TAG: ${{ needs.version.outputs.tag }}
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Generate PR body
        run: |-
          git-cliff --unreleased --strip all
          npx prettier --write --no-config "$GIT_CLIFF_OUTPUT"
        env:
          GIT_CLIFF_CONFIG_URL: ${{ env.GIT_CLIFF_CONFIG_URL }}
          GIT_CLIFF_OUTPUT: ${{ runner.temp }}/body.md
          GIT_CLIFF_TAG: ${{ needs.version.outputs.tag }}
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
      - if: hashFiles('package.json')
        name: Bump package.json
        run: npm version '${{ needs.version.outputs.version }}' --no-git-tag-version
      - name: Create PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.auth.outputs.token }}
          commit-message: "chore(release): ${{ needs.version.outputs.tag }}"
          branch: release-please/${{ github.ref_name }}
          delete-branch: true
          sign-commits: true
          title: "chore(release): ${{ needs.version.outputs.tag }}"
          body-path: ${{ runner.temp }}/body.md
          labels: |-
            automerge
            release-please
          assignees: ${{ github.repository_owner }}

