name: Release / PR

on:
  push:
    branches:
      - main

env:
  GIT_CLIFF_CONFIG_URL: >-
    https://raw.githubusercontent.com/liblaf/copier-release/0c66649f89da259fdfdc5e34caf43a57d1ce5d46/cliff.toml

