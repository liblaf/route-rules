    - cron: "0 0 * * 6" # Runs at 00:00, only on Saturday
  workflow_dispatch:

env:
  FORCE_COLOR: 1

jobs:
  copier-update:
    name: Copier Update
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    environment:
      name: copier
      deployment: false
    steps:
      - id: auth
        name: Auth
        uses: liblaf/actions/auth@512d1652c6a71a8f141d1901f50994afaddc925e # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      - name: Install Copier
        run: pipx install --pip-args cookiecutter copier
      - name: Copier update
        run: mise run copier-update --skip-answered --trust --force
      - name: Create PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.auth.outputs.token }}
          commit-message: "chore(copier): update from template"
          branch: copier-update/${{ github.ref_name }}
          delete-branch: true
          sign-commits: true
          title: "chore(copier): update from template"
          body: >-
            Automated changes by [${{ github.workflow }}](${{ github.server_url
            }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            Workflow
          labels: |-
            automerge
            copier
          assignees: ${{ github.repository_owner }}
