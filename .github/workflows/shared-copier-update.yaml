        name: Auth
        uses: liblaf/actions/auth@ce9dc3a1daa92e93ddfe62d8378b93cedaa5056c # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - name: Install Copier
        run: pipx install --pip-args cookiecutter copier
      - name: Copier update
        run: mise run copier-update --skip-answered --trust --force
      - name: Create PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.auth.outputs.token }}
          commit-message: "chore(copier): update from template"
          branch: copier-update/${{ github.ref_name }}
          delete-branch: true
          sign-commits: true
          title: "chore(copier): update from template"
          body: >-
