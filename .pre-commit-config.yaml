# yaml-language-server: $schema=https://www.schemastore.org/pre-commit-config.json
# This file is @generated by <https://github.com/liblaf/copier-shared>.
# DO NOT EDIT!

# ref: <https://pre-commit.ci/>
# ref: <https://pre-commit.com/>

ci:
  autofix_commit_msg: |-
    chore(pre-commit): auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autoupdate_commit_msg: |-
    chore(pre-commit): pre-commit autoupdate
  skip:
    - oxfmt
    - oxlint

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/oxc-project/mirrors-oxfmt
    rev: v0.45.0
    hooks:
      - id: oxfmt
  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.60.0
    hooks:
      - id: oxlint
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        exclude: ^(.+\.lock)|(.+-lock\..+)$
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.80
    hooks:
      - id: rumdl-fmt
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
